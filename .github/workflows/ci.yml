name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip show ruff >/dev/null 2>&1 || pip install ruff
          python -m pip show pytest >/dev/null 2>&1 || pip install pytest

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest tests/
